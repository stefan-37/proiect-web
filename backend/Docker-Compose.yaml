services:
    backend:
        build: .
        environment:
            DATABASE_URL: postgres://postgres:5432/mydatabase
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - ./seed/admins.json:/running/seed/admins.json
            - ./seed/trainers.json:/running/seed/trainers.json

    postgres:
        image: postgres:17-alpine
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: mydatabase
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d mydatabase"]
            interval: 2s
            timeout: 3s
            retries: 10

    nginx:
        image: nginx:latest
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - backend

volumes:
    postgres_data:
