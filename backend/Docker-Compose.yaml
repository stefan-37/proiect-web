services:
    backend:
        build: ./backend
        ports:
            - "8080:8080"
        environment:
            DATABASE_URL: postgres://postgres:5432/mydatabase
        depends_on: 
            -postgres

    postgres:
        image: postgres:17-alpine
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: mydatabase    

    volumes:
        postgres_data:        



