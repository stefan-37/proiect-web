services:
    backend:
        build: .
        ports:
            - "8080:8080"
        environment:
            DATABASE_URL: postgres://postgres:5432/mydatabase
        depends_on:
            postgres:
                condition: service_healthy

    postgres:
        image: postgres:17-alpine
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: mydatabase
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d mydatabase"]
            interval: 2s
            timeout: 3s
            retries: 10

volumes:
    postgres_data:
