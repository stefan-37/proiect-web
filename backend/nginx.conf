events {}

http {
    resolver 127.0.0.11 ipv6=off;
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=1000r/s;

    server {
        listen 80;

        location = /subscriptions{
            content_by_lua_block {
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(100)
                local ok = red:connect("redis", 6379)

                if ok then
                    local cached = red:get("cache:subscriptions")
                    if cached and cached ~= ngx.null then
                        red:set_keepalive(10000, 100)
                        ngx.header.content_type = "application/json"
                        ngx.header["X-Cache"] = "HIT"
                        ngx.print(cached)
                        return
                    end
                end

                -- Miss: fetch from backend via subrequest, cache, return.
                local res = ngx.location.capture("/_backend/subscriptions")
                if res.status == 200 then
                    if ok then
                        red:setex("cache:subscriptions", 60, res.body)
                        red:set_keepalive(10000, 100)
                    end
                    ngx.header.content_type = "application/json"
                    ngx.header["X-Cache"] = "MISS"
                    ngx.status = 200
                    ngx.print(res.body)
                else
                    ngx.status = res.status
                    ngx.print(res.body)
                end
            }
        }

        location = /classes {
            content_by_lua_block {
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(100)
                local ok = red:connect("redis", 6379)

                if ok then
                    local cached = red:get("cache:classes")
                    if cached and cached ~= ngx.null then
                        red:set_keepalive(10000, 100)
                        ngx.header.content_type = "application/json"
                        ngx.header["X-Cache"] = "HIT"
                        ngx.print(cached)
                        return
                    end
                end

                -- Miss: fetch from backend via subrequest, cache, return.
                local res = ngx.location.capture("/_backend/classes")
                if res.status == 200 then
                    if ok then
                        red:setex("cache:classes", 60, res.body)
                        red:set_keepalive(10000, 100)
                    end
                    ngx.header.content_type = "application/json"
                    ngx.header["X-Cache"] = "MISS"
                    ngx.status = 200
                    ngx.print(res.body)
                else
                    ngx.status = res.status
                    ngx.print(res.body)
                end
            }
        }

        # Internal route OpenResty uses to reach the backend on cache miss.
        location /_backend/ {
            internal;
            proxy_pass http://backend:8080/;
            proxy_set_header Host $host;
        }


        location / {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/(user|admin|trainer)/login$ {
            limit_req zone=mylimit burst=10 nodelay;
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
